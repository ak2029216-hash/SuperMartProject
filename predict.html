<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Super Mart Sales Prediction</a>
        <div>
            <a class="btn btn-outline-light me-2" href="/">Home</a>
            <a class="btn btn-outline-light me-2" href="/about">About</a>
            <a class="btn btn-outline-light me-2" href="/dataset">Dataset</a>
            <a class="btn btn-outline-light me-2" href="/dashboard">Dashboard</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow-lg p-4">
        <h1 class="text-center mb-4">Sales Prediction</h1>
        
        <form action="/result" method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Item Weight</label>
                    <input type="number" step="0.01" name="weight" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Item MRP</label>
                    <input type="number" step="0.01" name="mrp" class="form-control" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Item Visibility</label>
                    <input type="number" step="0.001" name="visibility" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Item Fat Content</label>
                    <select name="fat_content" class="form-select" required>
                        <option value="Low Fat">Low Fat</option>
                        <option value="Regular">Regular</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Item Type</label>
                    <select name="item_type" class="form-select" required>
                        <option value="Dairy">Dairy</option>
                        <option value="Soft Drinks">Soft Drinks</option>
                        <option value="Meat">Meat</option>
                        <option value="Fruits and Vegetables">Fruits and Vegetables</option>
                        <option value="Household">Household</option>
                        <option value="Baking Goods">Baking Goods</option>
                        <option value="Snack Foods">Snack Foods</option>
                        <option value="Others">Others</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Outlet Establishment Year</label>
                    <input type="number" name="year" class="form-control" placeholder="e.g. 1999" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Outlet Size</label>
                    <select name="outlet_size" class="form-select" required>
                        <option value="Small">Small</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Location Type</label>
                    <select name="location_type" class="form-select" required>
                        <option value="Tier 1">Tier 1</option>
                        <option value="Tier 2">Tier 2</option>
                        <option value="Tier 3">Tier 3</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Outlet Type</label>
                    <select name="outlet_type" class="form-select" required>
                        <option value="Grocery Store">Grocery Store</option>
                        <option value="Supermarket Type1">Supermarket Type1</option>
                        <option value="Supermarket Type2">Supermarket Type2</option>
                        <option value="Supermarket Type3">Supermarket Type3</option>
                    </select>
                </div>
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary btn-lg">Predict Sales</button>
            </div>
        </form>
    </div>
</div>

<footer class="bg-dark text-white text-center p-4 mt-5">
    <h5>Super Mart Sales Prediction Project</h5>
    <p>Machine Learning Based Retail Forecasting System</p>
</footer>

</body>
</html>

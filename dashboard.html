<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Super Mart Sales Prediction</a>
        <div>
            <a class="btn btn-outline-light me-2" href="/">Home</a>
            <a class="btn btn-outline-light me-2" href="/about">About</a>
            <a class="btn btn-outline-light me-2" href="/dataset">Dataset</a>
            <a class="btn btn-outline-light me-2" href="/predict">Predict</a>
            <a class="btn btn-light" href="/dashboard">Dashboard</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h1 class="text-center mb-5">Sales Analytics Dashboard</h1>

    <div class="row">
        <div class="col-md-8 mb-4">
            <div class="card shadow p-4 h-100">
                <h4 class="text-center mb-3">Average Sales by Outlet Type</h4>
                <canvas id="outletChart"></canvas>
            </div>
        </div>

        <div class="col-md-4 mb-4">
            <div class="card shadow p-4 h-100">
                <h4 class="text-center mb-3">Store Locations</h4>
                <canvas id="tierChart"></canvas>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-12 mb-4">
            <div class="card shadow p-4">
                <h4 class="text-center mb-3">Product Category Distribution</h4>
                <canvas id="itemChart"></canvas>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center p-4 mt-5">
    <h5>Super Mart Sales Prediction Project</h5>
    <p>Machine Learning Based Retail Forecasting System</p>
</footer>

<script>
    // 1. Bar Chart: Outlet Type
    const ctx1 = document.getElementById('outletChart').getContext('2d');
    new Chart(ctx1, {
        type: 'bar',
        data: {
            labels: ['Grocery Store', 'Supermarket Type1', 'Supermarket Type2', 'Supermarket Type3'],
            datasets: [{
                label: 'Average Sales (₹)',
                data: [4500, 18500, 16000, 22000],
                backgroundColor: ['#ff6384', '#36a2eb', '#cc65fe', '#ffce56']
            }]
        }
    });

    // 2. Pie Chart: Location Tier
    const ctx2 = document.getElementById('tierChart').getContext('2d');
    new Chart(ctx2, {
        type: 'pie',
        data: {
            labels: ['Tier 1', 'Tier 2', 'Tier 3'],
            datasets: [{
                data: [30, 35, 35],
                backgroundColor: ['#4bc0c0', '#ff9f40', '#9966ff']
            }]
        }
    });

    // 3. Line Chart: Item Type Distribution
    const ctx3 = document.getElementById('itemChart').getContext('2d');
    new Chart(ctx3, {
        type: 'line',
        data: {
            labels: ['Dairy', 'Soft Drinks', 'Meat', 'Fruits/Veg', 'Household', 'Baking', 'Snacks', 'Others'],
            datasets: [{
                label: 'Items in Inventory',
                data: [1100, 800, 950, 1500, 1200, 900, 1400, 673],
                borderColor: '#36a2eb',
                fill: true,
                backgroundColor: 'rgba(54, 162, 235, 0.2)'
            }]
        }
    });
</script>

</body>
</html>
